<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Orders</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="css/admin.css">
</head>

<body>

<button class="hamburger" id="hamburger" onclick="toggleSidebar()">
  <i class="fas fa-bars"></i>
</button>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">

  <div class="sidebar-header">
    <div class="logo-icon">🛒</div>
    <h2>Code<span>Alpha</span></h2>
  </div>

  <div class="sidebar-divider">Main Menu</div>

  <a href="dashboard.html">
    <i class="fas fa-chart-pie"></i> Dashboard
  </a>

  <a href="products.html">
    <i class="fas fa-box"></i> Products
  </a>

  <a href="orders.html" class="active">
    <i class="fas fa-truck"></i> Orders
  </a>

  <a href="users.html">
    <i class="fas fa-users"></i> Users
  </a>

  <div class="sidebar-divider">Other</div>

  <a href="../index.html">
    <i class="fas fa-globe"></i> Website
  </a>

  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="avatar">
        <i class="fas fa-user"></i>
      </div>
      <div class="sidebar-user-info">
        <h4 id="adminName">Admin</h4>
        <p>Administrator</p>
      </div>
    </div>
  </div>

</div>

<div class="content">

<h1>Manage Orders</h1>
<p class="subtitle">Track and manage all customer orders</p>

<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th>Order ID</th>
        <th>Customer</th>
        <th>Total</th>
        <th>Status</th>
        <th>Payment</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="orderTable">
    </tbody>
  </table>
</div>

</div>

<script src="js/adminAuth.js"></script>
<script src="js/orders.js"></script>
<script>
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('active');
}
</script>

</body>
</html>
