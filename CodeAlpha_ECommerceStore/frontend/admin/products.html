<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products</title>

    <link rel="stylesheet" href="css/admin.css">
</head>

<body>

<div class="sidebar">

    <h2>🛒 Admin Panel</h2>

    <a href="dashboard.html">Dashboard</a>
    <a href="products.html">Products</a>
    <a href="orders.html">Orders</a>
    <a href="../index.html">Website</a>
    <a href="users.html">Users</a>

</div>

<div class="content">

<h1>Manage Products</h1>

<input
type="text"
id="search"
placeholder="Search Product..."
>

<br><br>

<form id="productForm">

<input
type="text"
id="name"
placeholder="Product Name"
required
>

<input
type="text"
id="category"
placeholder="Category"
required
>

<input
type="number"
id="price"
placeholder="Price"
required
>

<input
type="number"
id="stock"
placeholder="Stock"
required
>

<input
type="file"
id="imageFile"
accept="image/*"
>

<input
type="text"
id="image"
placeholder="(optional) Image URL if you don’t upload a file"
>


<textarea
id="description"
placeholder="Description"
required
></textarea>

<button type="submit">

Save Product

</button>


</form>

<hr>

<table>

<thead>

<tr>

<th>Name</th>

<th>Category</th>

<th>Price</th>

<th>Stock</th>

<th>Action</th>

</tr>

</thead>

<tbody id="productTable">

</tbody>

</table>

</div>

<script src="js/adminAuth.js"></script>
<script src="js/products.js"></script>

</body>

</html>
