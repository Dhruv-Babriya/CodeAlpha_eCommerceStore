<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Review your shopping cart at CodeAlpha Store. Manage items, apply coupons, and proceed to checkout securely.">
<link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">

<title>Shopping Cart - CodeAlpha Store</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">

</head>
<body>

<script>
// Apply dark mode immediately to prevent flash
if (localStorage.getItem('darkMode') === 'enabled') {
    document.body.classList.add('dark-mode');
}
function toggleDarkMode() {
    const html = document.documentElement;
    const body = document.body;
    html.classList.toggle('dark-mode');
    body.classList.toggle('dark-mode');
    const isDark = html.classList.contains('dark-mode');
    localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
    const toggleBtn = document.querySelector('.dark-mode-toggle i');
    if (toggleBtn) {
        toggleBtn.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
    }
}
</script>

<button class="back-to-top" id="backToTop" onclick="scrollToTop()" aria-label="Back to top">
    <i class="fas fa-arrow-up"></i>
</button>

<header>

<div class="logo">
<h2>🛒 CodeAlpha Store</h2>
</div>

<nav>

<a href="index.html">Home</a>
<a href="orders.html">Orders</a>
<a href="profile.html">Profile</a>
<button class="dark-mode-toggle" onclick="toggleDarkMode()" aria-label="Toggle dark mode">
    <i class="fas fa-moon"></i>
</button>

</nav>

</header>

<section class="cart-page">

<div class="cart-items">

<h2>Your Shopping Cart</h2>

<div id="cartContainer"></div>

</div>

<div class="cart-summary">

<h2>Order Summary</h2>

<div class="summary-row">
<span>Subtotal</span>
<span id="subtotal">₹0</span>
</div>

<div class="summary-row">
<span>Shipping</span>
<span id="shipping">₹100</span>
</div>

<div class="summary-row">
<span>Discount</span>
<span id="discount">₹0</span>
</div>

<hr>

<div class="summary-row total">

<span>Total</span>

<span id="total">₹0</span>

</div>

<div class="coupon-box">
    <input
        type="text"
        id="couponCode"
        placeholder="Enter Coupon Code">

    <button onclick="applyCoupon()">
        Apply
    </button>
</div>

<button
class="checkout-btn"
onclick="checkout()">

Proceed to Checkout

</button>

</div>

</section>

<script src="js/cart.js"></script>

</body>

</html>
