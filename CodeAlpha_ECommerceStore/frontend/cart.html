<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>

    <div class="logo">
        <h2>🛒 CodeAlpha Store</h2>
    </div>

    <nav>

<div class="cart-container">

    </div>

</div>

<script src="js/cart.js"></script>

</html>
