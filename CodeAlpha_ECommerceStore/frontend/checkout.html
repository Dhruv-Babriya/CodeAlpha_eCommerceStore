<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">
<meta name="description" content="Secure checkout at CodeAlpha Store. Enter your shipping details and place your order with confidence.">
<link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">

<title>Checkout - CodeAlpha Store</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<script>
// Apply dark mode immediately to prevent flash
if (localStorage.getItem('darkMode') === 'enabled') {
    document.body.classList.add('dark-mode');
}
function toggleDarkMode() {
    const html = document.documentElement;
    const body = document.body;
    html.classList.toggle('dark-mode');
    body.classList.toggle('dark-mode');
    const isDark = html.classList.contains('dark-mode');
    localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
    const toggleBtn = document.querySelector('.dark-mode-toggle i');
    if (toggleBtn) {
        toggleBtn.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
    }
}
</script>

<button class="back-to-top" id="backToTop" onclick="scrollToTop()" aria-label="Back to top">
    <i class="fas fa-arrow-up"></i>
</button>

<header>

<div class="logo">
<h2>🛒 CodeAlpha Store</h2>
</div>

<nav>

<a href="index.html">Home</a>
<a href="cart.html">Cart</a>
<a href="orders.html">Orders</a>
<button class="dark-mode-toggle" onclick="toggleDarkMode()" aria-label="Toggle dark mode">
    <i class="fas fa-moon"></i>
</button>

</nav>

</header>

<section class="checkout-page">

<div class="checkout-form">

<h2>Shipping Address</h2>

<form id="checkoutForm">

<input
type="text"
id="fullname"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="text"
id="phone"
placeholder="Phone Number"
required>

<textarea
id="address"
placeholder="Full Address"
required></textarea>

<input
type="text"
id="city"
placeholder="City"
required>

<input
type="text"
id="state"
placeholder="State"
required>

<input
type="text"
id="pincode"
placeholder="Pincode"
required>

<h3>Payment Method</h3>

<label>

<input
type="radio"
name="payment"
value="COD"
checked>

Cash on Delivery

</label>

<label>

<input
type="radio"
name="payment"
value="UPI">

UPI

</label>

<label>

<input
type="radio"
name="payment"
value="Card">

Credit / Debit Card

</label>

<button type="submit">

Place Order

</button>

</form>

</div>

<div class="checkout-summary">

<h2>Order Summary</h2>

<div id="orderSummary"></div>

<hr>

<h3>Total:

<span id="totalPrice">

₹0

</span>

</h3>

<div class="secure-box">

🔒 Secure Checkout

</div>

</div>

</section>

<script src="js/checkout.js"></script>

</body>
