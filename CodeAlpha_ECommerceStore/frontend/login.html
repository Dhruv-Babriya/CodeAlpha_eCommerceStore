<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>

    <div class="logo">
        <h2>🛒 CodeAlpha Store</h2>
    </div>

</header>

<div class="auth-container">

    <h1>Login</h1>

    <form id="loginForm">

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">

            Login

        </button>

    </form>

    <p>

        Don't have an account?

        <a href="register.html">

            Register

        </a>

    </p>

</div>

<script src="js/login.js"></script>

</body>
</html>
