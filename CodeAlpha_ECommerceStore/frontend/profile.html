 <!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">

<title>My Profile - CodeAlpha Store</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<script>
// Apply dark mode immediately to prevent flash
if (localStorage.getItem('darkMode') === 'enabled') {
    document.body.classList.add('dark-mode');
}
function toggleDarkMode() {
    const html = document.documentElement;
    const body = document.body;
    html.classList.toggle('dark-mode');
    body.classList.toggle('dark-mode');
    const isDark = html.classList.contains('dark-mode');
    localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
    const toggleBtn = document.querySelector('.dark-mode-toggle i');
    if (toggleBtn) {
        toggleBtn.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
    }
}
</script>

<button class="back-to-top" id="backToTop" onclick="scrollToTop()" aria-label="Back to top">
    <i class="fas fa-arrow-up"></i>
</button>

<header>

<div class="logo">
