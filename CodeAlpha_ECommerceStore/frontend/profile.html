<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header>

<div class="logo">
<h2>🛒 CodeAlpha Store</h2>
</div>

<nav>

<a href="index.html">Home</a>

<a href="cart.html">Cart</a>

<a href="orders.html">Orders</a>

</nav>

</header>

<section class="profile-page">

<div class="profile-sidebar">

<img
id="profileImage">

<input
type="file"
id="imageFile">

<h2 id="userName">

Loading...

</h2>

<p id="userEmail">

Loading...

</p>

<button onclick="logout()">

Logout

</button>

</div>

<div class="profile-content">

<div class="profile-card">

<h2>

Personal Information

</h2>

<input
id="name"
type="text"
placeholder="Full Name">

<input
id="email"
type="email"
placeholder="Email">

<textarea
id="address"
placeholder="Address">
</textarea>

<button onclick="updateProfile()">

Save Changes

</button>

</div>

<div class="profile-card">

<h2>

Change Password

</h2>

<input
type="password"
id="oldPassword"
placeholder="Old Password">

<input
type="password"
id="newPassword"
placeholder="New Password">

<button>

Update Password

</button>

</div>

<div class="profile-card">

<h2>

Account Statistics

</h2>

<div class="stats-grid">

<div>

<h3 id="orderCount">

0

</h3>

<p>Orders</p>

</div>

<div>

<h3 id="wishlistCount">

0

</h3>

<p>Wishlist</p>

</div>

<div>

<h3 id="cartCount">

0

</h3>

<p>Cart</p>

</div>

</div>

</div>

</div>

</section>

<script src="js/profile.js"></script>

</body>

</html>
