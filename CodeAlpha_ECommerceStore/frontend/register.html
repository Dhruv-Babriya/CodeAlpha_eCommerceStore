<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register - CodeAlpha Store</title>

<link rel="stylesheet" href="css/auth.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">

</head>

<body>

<script>
// Apply dark mode immediately to prevent flash
if (localStorage.getItem('darkMode') === 'enabled') {
    document.body.classList.add('dark-mode');
}
function toggleDarkMode() {
    const html = document.documentElement;
    const body = document.body;
    html.classList.toggle('dark-mode');
    body.classList.toggle('dark-mode');
    const isDark = html.classList.contains('dark-mode');
    localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
    const toggleBtn = document.querySelector('.dark-mode-toggle i');
    if (toggleBtn) {
        toggleBtn.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
    }
}
</script>

<div class="auth-card">

<h1>Create Account</h1>

<p>Join CodeAlpha Store Today</p>

<form id="registerForm">

<div class="input-group">

<input
type="text"
id="name"
placeholder="Full Name"
required>

</div>

<div class="input-group">

<div class="input-wrapper">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Email Address"
required>

</div>

<div id="emailError" class="error"></div>

</div>

<div class="input-group">

<div class="input-wrapper">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
placeholder="Password"
required>

<i
class="fa-solid fa-eye togglePassword"
onclick="togglePassword()">
</i>

</div>

<div id="passwordError" class="error"></div>

</div>

<button
class="auth-btn"
type="submit">

Register

</button>

</form>

<div class="bottom-text">

Already have an account?

<a href="login.html">

Login

</a>

</div>

</div>

<script src="js/register.js"></script>

</body>

</html>
