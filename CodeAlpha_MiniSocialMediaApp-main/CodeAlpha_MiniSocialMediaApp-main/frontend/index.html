<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Mini Social Media</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Left Navigation Sidebar -->
        <aside class="sidebar-left glass-card">
            <div>
                <div class="brand">
                    <span>🌐 Connectify</span>
                </div>
                <nav>
                    <ul class="nav-menu">
                        <li>
                            <a href="index.html" class="nav-link active">
                                🏠 <span>Home Feed</span>
                            </a>
                        </li>
                        <li>
                            <a href="profile.html" class="nav-link">
                                👤 <span>Profile</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
            
            <div>
                <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
                    🌙
                </button>
                <div class="current-user-card" id="currentUserCard">
                    <!-- Loaded dynamically by JS -->
                </div>
            </div>
        </aside>

        <!-- Main Feed -->
        <main class="main-feed">
            <!-- Create Post Card -->
            <div class="create-post-card glass-card">
                <div class="create-post-header">
                    <img src="" alt="Avatar" class="avatar" id="createPostUserAvatar">
                    <textarea id="content" class="create-post-textarea" placeholder="What's on your mind? Share your story..." oninput="updateCharCount()"></textarea>
                </div>
                
                <div class="image-input-container">
                    <span>📷</span>
                    <input type="text" id="postImageUrl" class="image-url-input" placeholder="Optional Image URL (e.g. https://images.unsplash.com/...)">
                </div>

                <div class="create-post-actions">
                    <span class="character-counter" id="charCounter">0 / 280</span>
                    <button class="btn create-post-btn" onclick="createPost()">
                        <span>Post</span>
                    </button>
                </div>
            </div>

            <!-- Feed Posts List -->
            <div id="posts">
                <div class="glass-card post-card" style="text-align: center; color: var(--text-muted);">
                    Loading feed...
                </div>
            </div>
        </main>

        <!-- Right Suggestions Sidebar -->
        <aside class="sidebar-right glass-card">
            <h3 class="widget-title">Who to Follow</h3>
            <div class="follow-suggestions-list" id="followSuggestions">
                <!-- Populated dynamically by JS -->
                <div style="color: var(--text-muted); font-size: 0.9rem; text-align: center;">Loading recommendations...</div>
            </div>
        </aside>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="script.js"></script>
</body>
</html>
