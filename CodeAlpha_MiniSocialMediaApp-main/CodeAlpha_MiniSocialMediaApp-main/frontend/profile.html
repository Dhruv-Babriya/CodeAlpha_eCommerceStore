<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Mini Social Media</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container profile-view">
        <!-- Left Navigation Sidebar -->
        <aside class="sidebar-left glass-card">
            <div>
                <div class="brand">
                    <span>🌐 Connectify</span>
                </div>
                <nav>
                    <ul class="nav-menu">
                        <li>
                            <a href="index.html" class="nav-link">
                                🏠 <span>Home Feed</span>
                            </a>
                        </li>
                        <li>
                            <a href="profile.html" class="nav-link active">
                                👤 <span>Profile</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
            
            <div>
                <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
                    🌙
                </button>
                <div class="current-user-card" id="currentUserCard">
                    <!-- Loaded dynamically by JS -->
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-feed">
            <!-- Profile Details Card -->
            <div class="profile-header-card glass-card">
                <div class="profile-cover"></div>
                <div class="profile-details-container">
                    <div class="profile-avatar-wrap">
                        <img src="" alt="Avatar" class="profile-avatar" id="profileUserAvatar">
                    </div>
                    
                    <div class="profile-actions" id="profileActionsArea">
                        <button class="btn btn-secondary" onclick="toggleBioEdit()" id="editBioBtn">✏️ Edit Bio</button>
                    </div>

                    <h2 class="profile-name" id="profileUserName">Loading...</h2>
                    <div class="user-handle" id="profileUserEmail">email@example.com</div>
                    
                    <!-- Bio display or edit mode -->
                    <div id="bioDisplay" class="profile-bio">Hello! I am new here.</div>
                    <div id="bioEditContainer" style="display: none;">
                        <textarea id="bioEditTextarea" class="bio-edit-textarea" placeholder="Tell us about yourself..."></textarea>
                        <div style="margin-top: 10px; display: flex; gap: 10px;">
                            <button class="btn" style="width: auto; padding: 6px 16px;" onclick="saveBio()">Save</button>
                            <button class="btn btn-secondary" style="width: auto; padding: 6px 16px;" onclick="toggleBioEdit()">Cancel</button>
                        </div>
                    </div>

                    <div class="profile-stats">
                        <div class="stat-item">
                            <span class="stat-number" id="statsPostCount">0</span>
                            <span class="stat-label">Posts</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number" id="statsFollowersCount">0</span>
                            <span class="stat-label">Followers</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-number" id="statsFollowingCount">0</span>
                            <span class="stat-label">Following</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- User's Posts Feed -->
            <h3 class="widget-title">My Posts</h3>
            <div id="posts">
                <!-- User posts rendered dynamically -->
                <div class="glass-card post-card" style="text-align: center; color: var(--text-muted);">
                    Loading posts...
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="script.js"></script>
</body>
</html>
